<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FIFA World Cup 2026 — Schedule</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.5.0/css/flag-icons.min.css" />
<style>
  :root {
    --bg: #0e0f12;
    --surface: #16181d;
    --surface-2: #1c1f26;
    --border: #262a33;
    --text: #e8eaee;
    --muted: #8a8f9b;
    --accent: #d4ff3a;
    --accent-soft: rgba(212, 255, 58, 0.12);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    font-feature-settings: "tnum" 1;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  header {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 40px;
  }

  .title-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.01em;
  }

  .tz-selector {
    display: inline-flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    align-self: flex-start;
  }

  .tz-btn {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }

  .tz-btn:hover { color: var(--text); }

  .tz-btn.active {
    background: var(--accent);
    color: #0e0f12;
  }

  .day-group { margin-bottom: 32px; }

  .day-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .day-date {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .day-count {
    font-size: 12px;
    color: var(--muted);
  }

  .match {
    display: grid;
    grid-template-columns: 72px 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    transition: border-color 0.15s, background 0.15s;
  }

  .match:hover {
    border-color: #353a45;
    background: var(--surface-2);
  }

  .match-time {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .match-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .match-teams {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
  }

  .team {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .team .fi {
    width: 20px;
    height: 14px;
    border-radius: 2px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .team-tbd {
    color: var(--muted);
    font-weight: 400;
    font-variant-numeric: tabular-nums;
  }

  .vs {
    color: var(--muted);
    font-size: 12px;
    margin: 0 4px;
    font-weight: 400;
  }

  .match-venue {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .match-stage {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
  }

  .match-stage.knockout {
    color: var(--accent);
    background: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  footer {
    margin-top: 48px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }

  .travel {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 8px 0;
    padding: 10px 16px;
    background: repeating-linear-gradient(
      135deg,
      rgba(212, 255, 58, 0.04),
      rgba(212, 255, 58, 0.04) 8px,
      transparent 8px,
      transparent 16px
    );
    border: 1px dashed #3a3f4a;
    border-radius: 10px;
    font-size: 13px;
  }
  .travel-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    white-space: nowrap;
  }
  .travel-times {
    color: var(--text);
    font-variant-numeric: tabular-nums;
    flex: 1;
  }
  .travel-end-day {
    color: var(--muted);
    font-size: 12px;
    margin-left: 4px;
  }
  .travel-duration {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .match.unavailable { opacity: 0.5; }
  .match.unavailable:hover { opacity: 1; }
  .match.unavailable .match-time {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-start;
  }
  .travel-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    background: var(--accent-soft);
    color: var(--accent);
    flex-shrink: 0;
  }
  .travel-mark svg { width: 13px; height: 13px; }

  @media (max-width: 600px) {
    .container { padding: 24px 14px 60px; }
    h1 { font-size: 22px; }
    .match {
      grid-template-columns: 56px 1fr;
      gap: 12px;
      padding: 12px 14px;
    }
    .match-stage {
      grid-column: 2;
      justify-self: start;
      margin-top: 4px;
    }
    .match-teams { font-size: 14px; }
    .travel {
      flex-wrap: wrap;
      gap: 6px 12px;
      font-size: 12px;
    }
    .travel-times { flex-basis: 100%; order: 3; }
  }
</style>
</head>

// Convert a local wall-clock time at venue tz into a UTC Date.
function localToUtc(dateStr, timeStr, tz) {
  const naive = new Date(`${dateStr}T${timeStr}:00Z`);
  const fmt = new Intl.DateTimeFormat("en-US", {
    timeZone: tz, hour12: false,
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit"
  });
  const parts = Object.fromEntries(fmt.formatToParts(naive).filter(p => p.type !== "literal").map(p => [p.type, p.value]));
  const asIfUtc = Date.UTC(+parts.year, +parts.month - 1, +parts.day,
                           +parts.hour % 24, +parts.minute, +parts.second);
  const offset = asIfUtc - naive.getTime();
  return new Date(naive.getTime() - offset);
}

    teamA: a, teamB: b, stage

}).sort((m1,m2) => m1.utc - m2.utc);

}));

const MATCH_DURATION_MS = 2 * 60 * 60 * 1000;
function isDuringTravel(m) {
  const start = m.utc.getTime();
  const end = start + MATCH_DURATION_MS;
  return TRAVEL.some(t => start < t.endUtc.getTime() && end > t.startUtc.getTime());
}

const fmtDateKey = (date, tz) => new Intl.DateTimeFormat("en-CA",
  { timeZone: tz, year: "numeric", month: "2-digit", day: "2-digit" }).format(date);

const fmtDateLabel = (date, tz) => new Intl.DateTimeFormat("en-GB",
  { timeZone: tz, weekday: "long", day: "numeric", month: "long" }).format(date);

function teamHtml(name) {
  const iso = FLAGS[name];
  if (!iso) return `<span class="team team-tbd">${name}</span>`;
  return `<span class="team"><span class="fi fi-${iso}"></span>${name}</span>`;
}

const fmtDayShort = (date, tz) => new Intl.DateTimeFormat("en-GB",
  { timeZone: tz, weekday: "short", day: "numeric", month: "short" }).format(date);

function travelHtml(t) {
  const startTime = fmtTime(t.startUtc, currentTz);
  const endTime = fmtTime(t.endUtc, currentTz);
  const sameDay = fmtDateKey(t.startUtc, currentTz) === fmtDateKey(t.endUtc, currentTz);
  const endLabel = sameDay
    ? endTime
    : `${endTime}<span class="travel-end-day">${fmtDayShort(t.endUtc, currentTz)}</span>`;
  const mins = Math.round((t.endUtc - t.startUtc) / 60000);
  const h = Math.floor(mins / 60), m = mins % 60;
  const dur = m ? `${h}h ${m}m` : `${h}h`;
  return `<div class="travel">
    <span class="travel-label">Travel</span>
    <span class="travel-times">${startTime} → ${endLabel}</span>
    <span class="travel-duration">${dur}</span>
  </div>`;
}

function render() {
  const root = document.getElementById("schedule");
  const items = [
    ...MATCHES.map(m => ({ utc: m.utc, kind: "match", data: m })),
    ...TRAVEL.map(t  => ({ utc: t.startUtc, kind: "travel", data: t })),
  ].sort((a, b) => a.utc - b.utc);

  const groups = new Map();
  for (const it of items) {
    const key = fmtDateKey(it.utc, currentTz);
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(it);
  }

  const html = [];
  for (const [, list] of groups) {
    const label = fmtDateLabel(list[0].utc, currentTz);
    const matchCount = list.filter(x => x.kind === "match").length;
    html.push(`<section class="day-group">
      <div class="day-header">
        <span class="day-date">${label}</span>
        <span class="day-count">${matchCount} ${matchCount === 1 ? "match" : "matches"}</span>
      </div>`);
    for (const it of list) {
      if (it.kind === "travel") {
        html.push(travelHtml(it.data));
        continue;
      }
      const m = it.data;
      const stageClass = KNOCKOUT_STAGES.has(m.stage) ? "knockout" : "";
      const travelling = isDuringTravel(m);
      const matchClass = travelling ? "match unavailable" : "match";
      const timeContent = travelling
        ? `<span class="travel-mark" title="Traveling — can't watch">${TRAVEL_ICON}</span>${fmtTime(m.utc, currentTz)}`
        : fmtTime(m.utc, currentTz);
      html.push(`<div class="${matchClass}">
        <div class="match-time">${timeContent}</div>
        <div class="match-info">
          <div class="match-teams">${teamHtml(m.teamA)}<span class="vs">vs</span>${teamHtml(m.teamB)}</div>
          <div class="match-venue">${m.venue} · ${m.city}</div>
        </div>
        <div class="match-stage ${stageClass}">${m.stage}</div>
      </div>`);
    }
    html.push(`</section>`);
  }
  root.innerHTML = html.join("");
}

document.querySelectorAll(".tz-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tz-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentTz = btn.dataset.tz;
    render();
  });
});

render();
</script>
</body>
</html>
