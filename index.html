<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FIFA World Cup 2026 — Schedule</title>
<style>
  :root {
    --bg: #0e0f12;
    --surface: #16181d;
    --surface-2: #1c1f26;
    --border: #262a33;
    --text: #e8eaee;
    --muted: #8a8f9b;
    --accent: #d4ff3a;
    --accent-soft: rgba(212, 255, 58, 0.12);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    font-feature-settings: "tnum" 1;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  header {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 40px;
  }

  .title-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.01em;
  }

  .tz-selector {
    display: inline-flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    align-self: flex-start;
  }

  .tz-btn {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }

  .tz-btn:hover {
    color: var(--text);
  }

  .tz-btn.active {
    background: var(--accent);
    color: #0e0f12;
  }

  .day-group {
    margin-bottom: 32px;
  }

  .day-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .day-date {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .day-count {
    font-size: 12px;
    color: var(--muted);
  }

  .match {
    display: grid;
    grid-template-columns: 72px 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    transition: border-color 0.15s, background 0.15s;
  }

  .match:hover {
    border-color: #353a45;
    background: var(--surface-2);
  }

  .match-time {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .match-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .match-teams {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .match-venue {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .match-stage {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
  }

  .match-stage.knockout {
    color: var(--accent);
    background: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  footer {
    margin-top: 48px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }

  @media (max-width: 600px) {
    .container { padding: 24px 14px 60px; }
    h1 { font-size: 22px; }
    .match {
      grid-template-columns: 60px 1fr;
      gap: 12px;
      padding: 12px 14px;
    }
    .match-stage {
      grid-column: 2;
      justify-self: start;
      margin-top: 4px;
    }
    .match-teams { font-size: 14px; white-space: normal; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>

        <h1>FIFA World Cup 2026</h1>
        <span class="subtitle">11 June – 19 July · USA · Canada · Mexico</span>
      </div>
      <div class="tz-selector" role="tablist">
        <button class="tz-btn active" data-tz="Europe/Zurich">Zurich</button>
        <button class="tz-btn" data-tz="America/Los_Angeles">Vancouver / Seattle</button>
      </div>
    </header>
    <main id="schedule"></main>
    <footer>Times shown in selected local timezone · Kick-offs based on the official FIFA match schedule</footer>
  </div>

  lincoln:  { stadium: "Lincoln Financial Field",   city: "Philadelphia",  tz: "America/New_York" },

// Helper: build a UTC instant from a local "YYYY-MM-DD HH:mm" at the venue tz.
// We rely on Intl to find the right offset for the given wall-clock time.
function localToUtc(dateStr, timeStr, tz) {
  // Start with naive UTC interpretation, then correct using the tz offset at that instant.
  const naive = new Date(`${dateStr}T${timeStr}:00Z`);
  const fmt = new Intl.DateTimeFormat("en-US", {
    timeZone: tz, hour12: false,
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit"
  });
  const parts = Object.fromEntries(fmt.formatToParts(naive).filter(p => p.type !== "literal").map(p => [p.type, p.value]));
  const asIfUtc = Date.UTC(+parts.year, +parts.month - 1, +parts.day, +parts.hour, +parts.minute, +parts.second);
  const offset = asIfUtc - naive.getTime();
  return new Date(naive.getTime() - offset);
}

// Build match list with UTC instants
const MATCHES = RAW.map(([date, time, venueKey, a, b, stage]) => {
  const v = VENUES[venueKey];
  return {
    utc: localToUtc(date, time, v.tz),
    venue: v.stadium,
    city: v.city,
    teamA: a,
    teamB: b,
    stage,
  };
}).sort((m1, m2) => m1.utc - m2.utc);

const KNOCKOUT_STAGES = new Set(["Round of 32","Round of 16","Quarter-final","Semi-final","Third-place","Final"]);

let currentTz = "Europe/Zurich";

function fmtTime(date, tz) {
  return new Intl.DateTimeFormat("en-GB", {
    timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: false
  }).format(date);
}

function fmtDateKey(date, tz) {
  return new Intl.DateTimeFormat("en-CA", {
    timeZone: tz, year: "numeric", month: "2-digit", day: "2-digit"
  }).format(date);
}

function fmtDateLabel(date, tz) {
  return new Intl.DateTimeFormat("en-GB", {
    timeZone: tz, weekday: "long", day: "numeric", month: "long"
  }).format(date);
}

function render() {
  const root = document.getElementById("schedule");
  const groups = new Map();
  for (const m of MATCHES) {
    const key = fmtDateKey(m.utc, currentTz);
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(m);
  }

  const html = [];
  for (const [key, list] of groups) {
    const label = fmtDateLabel(list[0].utc, currentTz);
    html.push(`<section class="day-group">
      <div class="day-header">
        <span class="day-date">${label}</span>
        <span class="day-count">${list.length} ${list.length === 1 ? "match" : "matches"}</span>
      </div>`);
    for (const m of list) {
      const stageClass = KNOCKOUT_STAGES.has(m.stage) ? "knockout" : "";
      html.push(`<div class="match">
        <div class="match-time">${fmtTime(m.utc, currentTz)}</div>
        <div class="match-info">
          <div class="match-teams">${m.teamA} &nbsp;vs&nbsp; ${m.teamB}</div>
          <div class="match-venue">${m.venue} · ${m.city}</div>
        </div>
        <div class="match-stage ${stageClass}">${m.stage}</div>
      </div>`);
    }
    html.push(`</section>`);
  }
  root.innerHTML = html.join("");
}

document.querySelectorAll(".tz-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tz-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentTz = btn.dataset.tz;
    render();
  });
});

render();
